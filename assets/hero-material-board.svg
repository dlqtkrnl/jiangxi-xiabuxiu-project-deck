  <text x="596" y="450" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="22">布性</text>
  <text x="596" y="486" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="22">针法节奏</text>
  <text x="596" y="522" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="22">留白关系</text>
  <text x="886" y="402" fill="#392A17" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="700">文化重点</text>
  <text x="886" y="450" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="22">地域气质</text>
  <text x="886" y="486" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="22">题材语义</text>
  <text x="886" y="522" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="22">真实性校核</text>
  <text x="596" y="652" fill="#392A17" font-family="'Microsoft YaHei', sans-serif" font-size="30" font-weight="700">现场建议</text>
  <text x="596" y="700" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="23">把这张板替换成“1张细节 + 1张工作室 + 1张样布”最合适。</text>
  <text x="596" y="738" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="23">即使暂时没有真实照片，也可先作为结构化视觉页使用。</text>
