  <text x="596" y="152" fill="#392A17" font-family="'Microsoft YaHei', sans-serif" font-size="34" font-weight="700">材料与工艺视觉板</text>
  <text x="596" y="198" fill="#725F43" font-family="'Microsoft YaHei', sans-serif" font-size="22">用于网页展示的示意图，可替换为真实照片</text>
  <text x="596" y="250" fill="#8F4B2C" font-family="'Microsoft YaHei', sans-serif" font-size="26" font-weight="700">建议替换为：</text>
  <text x="620" y="292" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="24">• 夏布绣局部细节照片</text>
  <text x="620" y="328" fill="#5B4B33" font-family="'Microsoft YaHei', sans-serif" font-size="24">• 样布/针法/纹理特写</text>
